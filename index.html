<!-- Updated index.html file with improvements -->

<!-- Faster camera sensitivity -->
<script>
  camera.sensitivity = 1.5;  // Adjusted for faster response
</script>

<!-- WASD for continuous movement -->
<script>
  document.addEventListener('keydown', function(event) {
    switch(event.key) {
      case 'w': moveForward(); break;
      case 's': moveBackward(); break;
      case 'a': moveLeft(); break;
      case 'd': moveRight(); break;
    }
  });
</script>

<!-- Gun model integration -->
<script>
  let gunModel = loadModel('path/to/gunModel'); // Load gun model
</script>

<!-- Improved FPS gameplay -->
<script>
  setFpsLimit(60); // Set FPS limit for smoother gameplay
</script>
